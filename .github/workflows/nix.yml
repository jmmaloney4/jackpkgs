name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@01340962baef8b10ad035d239950196e57945e63 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
