  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/sector7/.github/workflows/nix.yml@dac339c2733613bd78fd0258f9213c8c3e71a07c # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
