  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/sector7/.github/workflows/nix.yml@17768ae04fd2fe8eb2eeed56adfadb624cbc4f29 # main
    with:
