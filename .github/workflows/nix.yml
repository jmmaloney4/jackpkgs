name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@d1bb05d071b58998e1b221414ba2ad109c573aad # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
