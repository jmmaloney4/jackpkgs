name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@7a1039a97432dcf0488ebe3ff3f0e23096ab2a64 # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
