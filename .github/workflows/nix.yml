name: '❄️ nix'
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  packages: write
jobs:
  nix:
    uses: jmmaloney4/toolbox/.github/workflows/nix.yml@e6f08de5f5b16fd7c44101c3c0f1df72fb6e450d # main
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.ref }}
